<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="820" height="300">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path fill="#888" d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>
  <style>
    .bg { fill: #fdfdfd; }
    .envelope { fill: #f2f2f2; stroke: #e0e0e0; stroke-width: 1; rx: 16; ry: 16; }
    .env-label { font-family: Helvetica, sans-serif; font-size: 12px; fill: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .node { fill: #fff; stroke: #333; stroke-width: 1.5; rx: 8; ry: 8; }
    .label { font-family: Helvetica, sans-serif; font-size: 14px; fill: #333; text-anchor: middle; dominant-baseline: middle; }
    .edge { fill: none; stroke: #888; stroke-width: 1.5; stroke-dasharray: 4 4; }
  </style>

  <rect class="bg" width="820" height="300" />

  <!-- Envelopes -->
  <rect class="envelope" x="40" y="60" width="540" height="180" />
  <text class="env-label" x="60" y="85">OpenClaw Layer</text>

  <rect class="envelope" x="620" y="60" width="160" height="180" />
  <text class="env-label" x="640" y="85">Channel</text>

  <!-- Edges -->
  <path class="edge" d="M 160 150 L 240 150" marker-end="url(#arrow)" />
  <path class="edge" d="M 360 150 L 440 150" marker-end="url(#arrow)" />
  <path class="edge" d="M 560 150 L 660 150" marker-end="url(#arrow)" />

  <!-- Nodes -->
  <rect class="node" x="60" y="120" width="100" height="60" />
  <text class="label" x="110" y="150">Contour SVG</text>

  <rect class="node" x="260" y="120" width="100" height="60" />
  <text class="label" x="310" y="150">rsvg-convert</text>

  <rect class="node" x="460" y="120" width="100" height="60" />
  <text class="label" x="510" y="150">outbound/PNG</text>

  <rect class="node" x="660" y="120" width="100" height="60" />
  <text class="label" x="710" y="150">Telegram</text>
</svg>