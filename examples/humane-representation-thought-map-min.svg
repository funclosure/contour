<svg width="100%" viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Humane Representation and the Ecology of Knowing</title>
  <desc id="desc">A concise thought-map connecting Bret Victor, John Vervaeke, Andy Clark, humane medium, ecology of knowing, and Grasp Tools.</desc>

  <defs>
