      .kind { font: 700 8px 'Avenir Next', 'Segoe UI', sans-serif; fill: #7a7168; letter-spacing: 0.08em; text-transform: uppercase; }
      .name { font: 700 14px 'Avenir Next', 'Segoe UI', sans-serif; fill: #1e1b18; }
      .summary { font: italic 11px 'Iowan Old Style', Georgia, serif; fill: #564d45; }
      .title { font: 700 22px 'Avenir Next', 'Segoe UI', sans-serif; fill: #1d1b19; letter-spacing: -0.02em; }
      .subtitle { font: 500 10.5px 'Avenir Next', 'Segoe UI', sans-serif; fill: #70685f; letter-spacing: 0.10em; text-transform: uppercase; }
      .annotation-box { fill: rgba(255,252,245,0.96); stroke: rgba(96,74,49,0.05); }
      .annotation { font: italic 12px 'Iowan Old Style', Georgia, serif; fill: #2b241c; }
      .footer { font: 500 9px 'Avenir Next', 'Segoe UI', sans-serif; fill: #8c8378; letter-spacing: 0.08em; text-transform: uppercase; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
